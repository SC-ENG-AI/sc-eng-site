<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Engineering | Digital Infrastructure</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1e293b;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }
        .description {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box; /* Fixes width issues */
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        .footer-text {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-text">SC Engineering</div>
        <p class="description">
            Building the future of digital infrastructure. <br>
            Our <strong>AI-powered</strong> Python solutions are launching soon.
        </p>
        
        <form>
            <input type="email" placeholder="Enter your business email" required>
            <button type="submit">Notify Me</button>
        </form>

        <div class="footer-text">
            © 2026 SC Engineering | sc-eng.co.za
        </div>
    </div>

</body>
</html>
