<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Engineering | Cloud-Native Software Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --primary: #00d2ff; /* Tech Cyan */
            --secondary: #3a7bd5; /* Deep Digital Blue */
            --dark: #0f172a; /* Deep Space Navy */
            --light: #f2f5f7;
        }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; color: var(--dark); line-height: 1.6; background-color: var(--light); }

/* HEADER */  
        /* Glassmorphism Header */
        header { background: var(--light); backdrop-filter: blur(10px); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo-img { 
            height: 100px; 
            width: 180px; 
            object-fit: contain;
            border-radius: 20px; /* Optional: rounds the corners of your logo */
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 2px; }
        nav a { margin-left: 60px; text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.9rem; }
        nav a:hover { color: var(--primary); }



/* REMOTE PROJECT INQUITY */
        .contact-section { padding:px 5%; background: var(--light); display: flex; flex-direction: column; align-items: center; }
        .contact-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #101011; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); outline: none; }
        .btn-submit { background: linear-gradient(90deg, var(--secondary), var(--primary)); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
/* FOOTER FORM */
        footer { background: var(--dark); color: #94a3b8; text-align: center; padding: 4rem 1rem; margin-top: 80px; }
        @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } }

        /*SOCIAL MEDIA*/ 
                .fa {
        padding: 10px;
        font-size: 20px;
        text-decoration: none;
        border-radius: 50%;
        }

        /* Specific colour for Facebook */
        .fa-facebook {
        background: #3B5998;
        color: white;
        } 

        .fa-intagram {
        background: #3B5998;
        color: white;
        }

        .fa-linkedin {
        background: #0077B5;
        color: white;

        }
        .fa-github {
        background: #333;
        color: white;
        }


        .fa {
        padding: 10px;
        font-size: 20px;
        width: 20px;
        text-align: center;
        text-decoration: none;
        border-radius: 50%; /* Makes them round */
        margin: 10px;
        }

        .fa:hover {
        opacity: 0.7;
        }

    </style>
</head>
<body>
    
<!--HEADER-->
    <header>
         <a href="index.html" class="logo-container">
             <img src="logo.png" alt="SC Logo" class="logo-img">
                
         </a>
        
         <nav>
             <a href="index.html">Home</a>
             <a href="services.html">Services</a>
             <a href="contact.html">Contact</a>
         </nav>
     </header>

<!-- REMOTE PROJECT INQUIRY -->
<section id="contact" class="contact-section">
    <div class="contact-box">
        <h2 style="margin-top:0;">Remote Project Inquiry</h2>
        <p style="color: #0e1011; margin-bottom: 30px;">Brief us on your software needs. We typically reply via Zoom/Meet within 24 hours.</p>
        
        <form id="enquiryForm" action="https://formsubmit.co/info.scengineering1@gmail.com" method="POST">
            <!-- START CONFIGURATION -->
            <input type="hidden" name="_subject" value="New SC Engineering Project Inquiry!">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="true">
            <input type="hidden" name="_next" value="https://sc-eng.co.za/success.html">
            <input type="hidden" name="_replyto" value="info@sc-eng.co.za">
            
            <!-- Honeypot (Spam Protection) -->
            <input type="text" name="_honey" style="display:none">
            
            <!-- Auto-Response Message -->
            <input type="hidden" name="_autoresponse" value="Thank you for contacting SC Engineering. We have received your software project brief and our team will get back to you within 24 hours to schedule a virtual discovery session.">
            <!-- END CONFIGURATION -->

            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Devin Tech" required>
                </div>
                <div class="form-group">
                    <label>Work Email</label>
                    <input type="email" name="email" placeholder="dev@company.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Service Required</label>
                <select name="service">
                    <option value="SaaS Development">SaaS Development</option>
                    <option value="Mobile App (iOS/Android)">Mobile App (iOS/Android)</option>
                    <option value="Cloud Infrastructure (DevOps)">Cloud Infrastructure (DevOps)</option>
                    <option value="AI/ML Integration">AI/ML Integration</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Project Scope</label>
                <textarea name="details" rows="4" placeholder="Briefly describe your software requirements..." required></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Submit Digital Brief</button>
        </form>
    </div>
</section>

<!--FOOTER-->
    <footer>
        <p>&copy; 2024 SC Engineering |  info@sc-eng.co.za</p>
        <p>Built for the distributed world.</p>
<!--SOCIAL MEDIA-->
        <a href="your-facebook-link"  target="_blank" class="fa fa-facebook"></a>
        <a href="https://github.com" target="_blank" class="fa fa-github"></a>
        <a href="https://linkedin.com" target="_blank" class="fa fa-linkedin"></a>
    </footer>

</body>
</html>
